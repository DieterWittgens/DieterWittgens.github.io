<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Mock API</title>
  </head>
  <body>
    <pre id="output"></pre>

    <script>
      const params = new URLSearchParams(window.location.search);
      const site = params.get("site");

      const response = {
        success: true,
        greeting: `Hello, ${site}!`,
        timestamp: new Date().toISOString(),
      };

      document.body.innerHTML = "";
      document.write(JSON.stringify(response));
    </script>
  </body>
</html>
